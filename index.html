        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

        <style>
            :root {
                --bg-color: #0d1117;
                --terminal-bg: #0d1117;
                --text-color: #c9d1d9;
                --prompt-color: #7ee787;
                --prompt-user: #c9d1d9;
                --prompt-path: #58a6ff;
                --highlight: #58a6ff;
                --link-color: #58a6ff;
                --dim-color: #8b949e;
                --header-bg: #161b22;
                --header-border: #30363d;
                --ascii-color: #bb0a1e;
            }

            * {
                box-sizing: border-box;
            }

            body {
                font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
                background-color: var(--bg-color);
                color: var(--text-color);
                margin: 0;
                padding: 0;
                overflow: hidden;
            }

            .terminal {
                width: 100%;
                height: 100vh;
                padding: 16px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
            }

            .terminal-header {
                background: var(--header-bg);
                border: 1px solid var(--header-border);
                border-radius: 8px 8px 0 0;
                padding: 8px 12px;
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 0;
            }

            .logo-link {
                display: flex;
                align-items: center;
            }

            .logo-svg {
                fill: var(--text-color);
            }

            .terminal-dot {
                width: 12px;
                height: 12px;
                border-radius: 50%;
            }

            .dot-red { background: #ff5f56; }
            .dot-yellow { background: #ffbd2e; }
            .dot-green { background: #27c93f; }

            .terminal-title {
                flex: 1;
                text-align: center;
                font-size: 12px;
                color: var(--dim-color);
            }

            .terminal-body {
                background: var(--terminal-bg);
                border: 1px solid var(--header-border);
                border-top: none;
                border-radius: 0 0 8px 8px;
                padding: 16px;
                flex: 1;
                overflow-y: auto;
                font-size: 13px;
                line-height: 1.6;
            }

            .prompt-line {
                display: flex;
                align-items: center;
                flex-wrap: wrap;
            }

            .prompt {
                display: flex;
                align-items: center;
                margin-right: 8px;
                flex-shrink: 0;
            }

            .prompt-user {
                color: var(--prompt-user);
            }

            .prompt-at {
                color: var(--dim-color);
            }

            .prompt-host {
                color: var(--prompt-user);
            }

            .prompt-path {
                color: var(--prompt-path);
            }

            .prompt-symbol {
                color: var(--prompt-color);
                margin-left: 4px;
            }

            .input-line {
                display: flex;
                align-items: center;
                flex-wrap: wrap;
            }

            #command-input {
                background: transparent;
                border: none;
                color: var(--text-color);
                font-family: inherit;
                font-size: inherit;
                outline: none;
                flex: 1;
                caret-color: var(--prompt-color);
            }

            .command-echo {
                color: var(--dim-color);
                margin-left: 3px;
            }

            a {
                color: var(--link-color);
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }

            .highlight {
                color: var(--highlight);
            }

            .dim {
                color: var(--dim-color);
            }

            .success { color: #7ee787; }
            .error { color: #ff7b72; }
            .info { color: #79c0ff; }

            .command-output {
                margin: 0;
                padding-bottom: 16px;
                white-space: pre-wrap;
            }

            .welcome-text {
                fill: var(--text-color);
                margin: 0;
                display: block;
                height: 4.5em;
            }

            @keyframes blink {
                0%, 100% { opacity: 1; }
                50% { opacity: 0; }
            }

            .cursor-blink {
                animation: blink 1s step-end infinite;
            }

            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: var(--bg-color);
            }

            ::-webkit-scrollbar-thumb {
                background: var(--header-border);
                border-radius: 4px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: var(--dim-color);
            }
        </style>
    </head>
    <body>
        <div class="terminal">
            <div class="terminal-header">
                <div class="terminal-dot dot-red"></div>
                <div class="terminal-dot dot-yellow"></div>
                <div class="terminal-dot dot-green"></div>
                <div class="terminal-title">dev@muhfajar.id ~ bash</div>
            </div>
            <div class="terminal-body" id="terminal-body">
                <div id="output"></div>
                <div class="input-line">
                    <div class="prompt" id="prompt">
                        <span class="prompt-user">dev</span>
                        <span class="prompt-at">@</span>
                        <span class="prompt-host">muhfajar</span>
                        <span class="prompt-path">:~</span>
                        <span class="prompt-symbol">$</span>
                    </div>
                    <input type="text" id="command-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
                </div>
            </div>
        </div>

        <script>
            const terminalBody = document.getElementById('terminal-body');
            const commandInput = document.getElementById('command-input');
            const output = document.getElementById('output');

            const commands = {
                help: 'Show available commands',
                about: 'Learn about me',
                skills: 'Technical skills & expertise',
                contact: 'Get in touch',
                links: 'Social links & resources',
                version: 'Show site version from Git',
                clear: 'Clear terminal',
                whoami: 'Display user info',
                date: 'Show current date & time',
                matrix: 'Experience the matrix'
            };

            const content = {
                about: `Hey, I'm <span class="highlight">Muhamad Fajar</span> — code wrangler, digital tinkerer, and full-time tech enthusiast based in <a href="https://en.wikipedia.org/wiki/Indonesia" target="_blank">Indonesia</a>.
By day, I lead the <a href="https://www.loket.com/loket-x/" target="_blank">X</a>, <a href="https://www.loket.com/login" target="_blank">Identity</a>, and <a href="https://screen.loket.com/" target="_blank">Screen</a> teams at <a href="https://loket.com" target="_blank">LOKÉT</a> as a Technical Lead, crafting smooth, snappy, and user-loving experiences.
With years of hands-on building and breaking (on purpose, I swear), I enjoy exploring new technologies and continuously learning, always curious about what's possible.`,

                skills: `<span class="highlight">Languages:</span> Go, Python, Ruby, PHP
<span class="highlight">Framework:</span> Django, Celery, Ruby on Rails, Hertz, Go-Zero, Prefect, Laravel
<span class="highlight">Database:</span> PostgreSQL, Redis, MySQL, ClickHouse
<span class="highlight">Cloud:</span> AWS, GCP, Docker, Kubernetes`,

                contact: `Got an idea, collab, or just wanna geek out?

<span class="highlight">Email:</span> <a href="#" id="contact-link"></a>
<span class="highlight">Blog:</span> <a href="https://www.muhfajar.blog" target="_blank">https://www.muhfajar.blog</a>`,

                links: `<span class="highlight">Blog:</span> <a href="https://www.muhfajar.blog" target="_blank">https://www.muhfajar.blog</a>
<span class="highlight">Nostr:</span> <a href="https://link.muhfajar.id/nostr" target="_blank">https://link.muhfajar.id/nostr</a>
<span class="highlight">Bluesky:</span> <a href="https://link.muhfajar.id/bsky" target="_blank">https://link.muhfajar.id/bsky</a>
<span class="highlight">Resume:</span> <a href="https://link.muhfajar.id/resume" target="_blank">https://link.muhfajar.id/resume</a>
<span class="highlight">GPG:</span> <a href="https://pgp.mit.edu/pks/lookup?search=muhfajar.email" target="_blank">https://pgp.mit.edu/pks/lookup?search=muhfajar.email</a>`
            };

            function printOutput(text, className = '') {
                const div = document.createElement('div');
                div.className = 'command-output ' + className;
                div.innerHTML = text;
                const emailLink = div.querySelector('#contact-link');
                if (emailLink) {
                    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789!?@#$%^&*';
                    const parts = ['contact', 'muhfajar.email'];
                    const email = parts[0] + String.fromCharCode(64) + parts[1];
                    let iterations = 0;
                    const maxIterations = 15;
                    const matrixInterval = setInterval(() => {
                        emailLink.textContent = Array(email.length).fill(0).map(() => chars[Math.floor(Math.random() * chars.length)]).join('');
                        iterations++;
                        if (iterations >= maxIterations) {
                            clearInterval(matrixInterval);
                            emailLink.textContent = email;
                            emailLink.href = 'mailto:' + email;
                        }
                    }, 80);
                }
                output.appendChild(div);
            }

            function printWelcome() {
                const logo = `<svg version="1.0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 346.000000 264.000000" class="welcome-text" preserveAspectRatio="xMidYMid meet">
                    <g transform="translate(0.000000,264.000000) scale(0.100000,-0.100000)" stroke="none">
                        <path d="M321 2389 c-18 -7 -21 -13 -15 -27 5 -9 9 -149 9 -311 l0 -294 -30 -10 c-53 -18 -53 -42 1 -105 l33 -39 3 -585 3 -584 30 -60 c50 -98 134 -125 223 -72 119 72 192 360 163 645 -21 206 -90 386 -214 559 -96 133 -97 129 48 127 66 -1 132 -8 148 -14 15 -6 30 -9 33 -7 2 3 10 33 16 67 17 91 9 97 -140 93 -64 -1 -129 -5 -144 -8 l-28 -6 0 287 c0 186 -4 293 -11 307 -10 19 -66 49 -91 47 -7 0 -24 -5 -37 -10z m215 -1171 c61 -180 81 -340 65 -524 -17 -188 -63 -309 -106 -274 -31 26 -35 86 -35 530 l1 445 21 -40 c12 -22 36 -83 54 -137z" />
                        <path d="M1533 2221 c-40 -25 -53 -49 -53 -101 0 -34 6 -48 34 -76 28 -28 42 -34 76 -34 55 0 96 30 111 80 30 99 -81 186 -168 131z" />
                        <path d="M2506 1888 c-43 -40 -38 -95 14 -152 l40 -43 -10 -131 c-16 -213 -49 -334 -107 -394 -32 -34 -57 -35 -87 -5 -22 22 -23 32 -30 222 -6 182 -8 201 -27 221 -23 24 -65 36 -98 27 -21 -5 -21 -9 -21 -203 l0 -197 -29 -41 c-79 -108 -191 -35 -191 124 0 125 44 237 120 308 64 60 107 78 200 85 l75 6 3 32 c2 25 -3 39 -23 59 -25 25 -30 26 -98 21 -143 -12 -296 -117 -361 -246 -32 -63 -44 -110 -57 -220 -8 -68 -18 -110 -39 -150 -30 -61 -100 -161 -112 -161 -5 0 -8 159 -8 353 0 391 0 390 -64 403 -19 3 -44 3 -55 -1 -20 -6 -21 -12 -21 -219 0 -159 -4 -227 -15 -271 -39 -150 -121 -216 -172 -138 -14 22 -18 59 -21 217 -4 173 -6 193 -24 212 -22 24 -64 36 -97 27 -21 -5 -21 -9 -21 -195 0 -207 -6 -238 -59 -279 -50 -40 -128 -5 -152 69 -17 52 -5 194 22 267 17 44 40 77 84 121 69 69 125 94 216 94 32 0 61 5 64 11 4 6 4 26 1 45 -15 75 -128 84 -263 19 -128 -60 -217 -168 -259 -310 -24 -82 -24 -223 0 -293 54 -159 213 -209 347 -109 l29 21 27 -26 c56 -54 128 -62 208 -24 28 13 58 31 68 40 16 16 17 12 17 -80 l0 -96 -88 -93 c-91 -95 -115 -133 -138 -220 -64 -238 137 -417 297 -265 59 56 69 108 69 343 l0 200 70 73 c38 40 82 93 97 116 15 24 29 45 30 47 2 3 18 -9 36 -27 82 -79 209 -82 288 -6 l25 24 25 -26 c51 -54 140 -69 214 -35 44 20 104 81 131 132 47 93 87 256 99 417 l7 82 85 0 c77 0 84 -2 78 -17 -4 -10 -23 -72 -42 -138 -33 -108 -36 -132 -37 -246 -1 -121 0 -127 26 -167 33 -50 73 -72 142 -79 65 -7 142 24 185 73 34 39 85 140 102 205 11 41 10 49 -7 72 -47 64 -74 48 -108 -65 -22 -74 -35 -99 -67 -131 -33 -33 -43 -38 -66 -32 -92 22 -95 148 -13 456 28 105 28 107 10 137 -29 48 -58 62 -126 62 -107 0 -155 10 -164 35 -26 68 -124 98 -174 53z m-991 -1434 c-6 -37 -38 -69 -60 -60 -9 3 -22 21 -30 41 -35 81 -4 211 69 293 l21 24 3 -134 c2 -73 0 -147 -3 -164z" />
                    </g>
                </svg>`;
                const helpText = `<span class="dim">Type 'help' to see available commands.</span>`;
                printOutput(logo);
                printOutput(helpText);
            }

            function executeCommand(cmd) {
                const command = cmd.trim().toLowerCase();

                if (command === '') {
                    return;
                }

                if (command === 'clear') {
                    output.innerHTML = '';
                    return;
                }

                if (command === 'help') {
                    let helpText = '<span class="dim">Available commands:</span>\n';
                    for (const [key, desc] of Object.entries(commands)) {
                        helpText += `  <span class="highlight">${key.padEnd(12)}</span> ${desc}\n`;
                    }
                    printOutput(helpText);
                    return;
                }

                if (command === 'about') {
                    printOutput(content.about);
                    return;
                }

                if (command === 'skills') {
                    printOutput(content.skills);
                    return;
                }

                if (command === 'contact') {
                    printOutput(content.contact);
                    return;
                }

                if (command === 'links') {
                    printOutput(content.links);
                    return;
                }

                if (command === 'whoami') {
                    printOutput('<span class="success">dev</span>');
                    return;
                }

                if (command === 'date') {
                    const now = new Date();
                    printOutput('<span class="info">' + now.toString() + '</span>');
                    return;
                }

                if (command === 'matrix') {
                    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
                    let matrixText = '';
                    for (let i = 0; i < 50; i++) {
                        matrixText += chars[Math.floor(Math.random() * chars.length)];
                    }
                    printOutput('<span class="success">' + matrixText + '</span>');
                    return;
                }

                if (command === 'version') {
                    printOutput('<span class="dim">Fetching latest commit...</span>');
                    fetch('https://api.github.com/repos/muhfajar/id/commits', { mode: 'cors' })
                        .then(res => res.status === 200 ? res.json() : Promise.reject(res.status))
                        .then(data => {
                            const commit = data[0];
                            const versionHtml = `<span class="highlight">Latest commit:</span> <a href="${commit.html_url}" target="_blank">${commit.sha.substring(0, 7)}</a>
<span class="dim">${commit.commit.message}</span>
<span class="dim">${commit.commit.author.name} - ${new Date(commit.commit.author.date).toLocaleDateString()}</span>`
                            output.lastChild.innerHTML = versionHtml;
                        })
                        .catch(err => {
                            output.lastChild.innerHTML = '<span class="error">Failed to fetch version info</span>';
                        });
                    return;
                }

                if (command === 'ls' || command === 'dir') {
                    printOutput('<span class="dim">about  contact  links  skills  help</span>');
                    return;
                }

                if (command === 'cat' || command === 'read') {
                    printOutput('<span class="error">Usage: cat [file]</span>\n<span class="dim">Available files: about, contact, links, skills</span>');
                    return;
                }

                printOutput(`<span class="error">Command not found: ${cmd}</span>\n<span class="dim">Type 'help' for available commands.</span>`);
            }

            commandInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const cmd = commandInput.value;
                    printOutput(`<span class="prompt"><span class="prompt-user">dev</span><span class="prompt-at">@</span><span class="prompt-host">muhfajar</span><span class="prompt-path">:~</span><span class="prompt-symbol">$ <span class="command-echo">${cmd}</span></span></span>`);
                    executeCommand(cmd);
                    commandInput.value = '';
                    terminalBody.scrollTop = terminalBody.scrollHeight;
                }
            });

            terminalBody.addEventListener('click', function() {
                commandInput.focus();
            });

            printWelcome();
            commandInput.focus();

            function revealEmail() {
                const link = document.getElementById('contact-link');
                if (link) {
                    const parts = ['contact', 'muhfajar.email'];
                    const email = parts[0] + String.fromCharCode(64) + parts[1];
                    const mailto = 'mailto:' + email;
                    link.textContent = email;
                    link.href = mailto;
                }
            }
            revealEmail();
        </script>
    </body>
</html>
