        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

        <style>
            :root {
                --bg-color: #0d1117;
                --terminal-bg: #0d1117;
                --text-color: #c9d1d9;
                --prompt-color: #7ee787;
                --prompt-user: #c9d1d9;
                --prompt-path: #58a6ff;
                --highlight: #58a6ff;
                --link-color: #58a6ff;
                --dim-color: #8b949e;
                --header-bg: #161b22;
                --header-border: #30363d;
                --ascii-color: #bb0a1e;
            }

            * {
                box-sizing: border-box;
            }

            body {
                font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
                background-color: var(--bg-color);
                color: var(--text-color);
                margin: 0;
                padding: 0;
                overflow: hidden;
            }

            .terminal {
                width: 100%;
                height: 100vh;
                padding: 16px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
            }

            .terminal-header {
                background: var(--header-bg);
                border: 1px solid var(--header-border);
                border-radius: 8px 8px 0 0;
                padding: 8px 12px;
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 0;
            }

            .terminal-dot {
                width: 12px;
                height: 12px;
                border-radius: 50%;
            }

            .dot-red { background: #ff5f56; }
            .dot-yellow { background: #ffbd2e; }
            .dot-green { background: #27c93f; }

            .terminal-title {
                flex: 1;
                text-align: center;
                font-size: 12px;
                color: var(--dim-color);
            }

            .terminal-body {
                background: var(--terminal-bg);
                border: 1px solid var(--header-border);
                border-top: none;
                border-radius: 0 0 8px 8px;
                padding: 16px;
                flex: 1;
                overflow-y: auto;
                font-size: 13px;
                line-height: 1.6;
            }

            .prompt-line {
                display: flex;
                align-items: center;
                flex-wrap: wrap;
            }

            .prompt {
                display: flex;
                align-items: center;
                margin-right: 8px;
                flex-shrink: 0;
            }

            .prompt-user {
                color: var(--prompt-user);
            }

            .prompt-at {
                color: var(--dim-color);
            }

            .prompt-host {
                color: var(--prompt-user);
            }

            .prompt-path {
                color: var(--prompt-path);
            }

            .prompt-symbol {
                color: var(--prompt-color);
                margin-left: 4px;
            }

            .input-line {
                display: flex;
                align-items: center;
                flex-wrap: wrap;
            }

            #command-input {
                background: transparent;
                border: none;
                color: var(--text-color);
                font-family: inherit;
                font-size: inherit;
                outline: none;
                flex: 1;
                caret-color: var(--prompt-color);
            }

            a {
                color: var(--link-color);
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }

            .highlight {
                color: var(--highlight);
            }

            .dim {
                color: var(--dim-color);
            }

            .success { color: #7ee787; }
            .error { color: #ff7b72; }
            .info { color: #79c0ff; }

            .command-output {
                margin: 0;
                padding-bottom: 16px;
                white-space: pre-wrap;
            }

            .welcome-text {
                color: var(--ascii-color);
                margin: 0;
                white-space: pre-wrap;
                line-height: 1.25;
            }

            @keyframes blink {
                0%, 100% { opacity: 1; }
                50% { opacity: 0; }
            }

            .cursor-blink {
                animation: blink 1s step-end infinite;
            }

            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: var(--bg-color);
            }

            ::-webkit-scrollbar-thumb {
                background: var(--header-border);
                border-radius: 4px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: var(--dim-color);
            }
        </style>
    </head>
    <body>
        <div class="terminal">
            <div class="terminal-header">
                <div class="terminal-dot dot-red"></div>
                <div class="terminal-dot dot-yellow"></div>
                <div class="terminal-dot dot-green"></div>
                <div class="terminal-title">dev@muhfajar.id ~ bash</div>
            </div>
            <div class="terminal-body" id="terminal-body">
                <div id="output"></div>
                <div class="input-line">
                    <div class="prompt" id="prompt">
                        <span class="prompt-user">dev</span>
                        <span class="prompt-at">@</span>
                        <span class="prompt-host">muhfajar</span>
                        <span class="prompt-path">:~</span>
                        <span class="prompt-symbol">$</span>
                    </div>
                    <input type="text" id="command-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
                </div>
            </div>
        </div>

        <script>
            const terminalBody = document.getElementById('terminal-body');
            const commandInput = document.getElementById('command-input');
            const output = document.getElementById('output');

            const commands = {
                help: 'Show available commands',
                about: 'Learn about me',
                skills: 'Technical skills & expertise',
                contact: 'Get in touch',
                links: 'Social links & resources',
                clear: 'Clear terminal',
                whoami: 'Display user info',
                date: 'Show current date & time',
                matrix: 'Experience the matrix'
            };

            const content = {
                about: `Hey, I'm <span class="highlight">Muhamad Fajar</span> — code wrangler, digital tinkerer, and full-time tech enthusiast based in <a href="https://en.wikipedia.org/wiki/Indonesia" target="_blank">Indonesia</a>.
By day, I lead the <a href="https://www.loket.com/loket-x/" target="_blank">X</a>, <a href="https://www.loket.com/login" target="_blank">Identity</a>, and <a href="https://screen.loket.com/" target="_blank">Screen</a> teams at <a href="https://loket.com" target="_blank">LOKÉT</a> as a Technical Lead, crafting smooth, snappy, and user-loving experiences.
With years of hands-on building and breaking (on purpose, I swear), I enjoy exploring new technologies and continuously learning, always curious about what's possible.`,

                skills: `<span class="highlight">Languages:</span> JavaScript, TypeScript, Go, Python
<span class="highlight">Frontend:</span> React, Next.js, Vue.js
<span class="highlight">Backend:</span> Node.js, PostgreSQL, Redis, GraphQL
<span class="highlight">Cloud:</span> AWS, GCP, Docker, Kubernetes`,

                contact: `Got an idea, collab, or just wanna geek out?

<span class="highlight">Email:</span> <a href="#" id="contact-link"></a>
<span class="highlight">Blog:</span> <a href="https://www.muhfajar.blog" target="_blank">https://www.muhfajar.blog</a>`,

                links: `<span class="highlight">Blog:</span> <a href="https://www.muhfajar.blog" target="_blank">https://www.muhfajar.blog</a>
<span class="highlight">Nostr:</span> <a href="https://link.muhfajar.id/nostr" target="_blank">https://link.muhfajar.id/nostr</a>
<span class="highlight">Bluesky:</span> <a href="https://link.muhfajar.id/bsky" target="_blank">https://link.muhfajar.id/bsky</a>
<span class="highlight">Resume:</span> <a href="https://link.muhfajar.id/resume" target="_blank">https://link.muhfajar.id/resume</a>
<span class="highlight">GPG:</span> <a href="https://pgp.mit.edu/pks/lookup?search=muhfajar.email" target="_blank">https://pgp.mit.edu/pks/lookup?search=muhfajar.email</a>`
            };

            function printOutput(text, className = '') {
                const div = document.createElement('div');
                div.className = 'command-output ' + className;
                div.innerHTML = text;
                output.appendChild(div);
            }

            function printWelcome() {
                const ascii = `     ┓ ┏  •     • ┓
┏┳┓┓┏┣┓╋┏┓┓┏┓┏┓ ┓┏┫
┛┗┗┗┻┛┗┛┗┻┃┗┻┛ •┗┗┻
          ┛
<span class="dim">Type 'help' to see available commands.</span>`;
                printOutput(ascii, 'welcome-text');
            }

            function executeCommand(cmd) {
                const command = cmd.trim().toLowerCase();

                if (command === '') {
                    return;
                }

                if (command === 'clear') {
                    output.innerHTML = '';
                    return;
                }

                if (command === 'help') {
                    let helpText = '<span class="dim">Available commands:</span>\n';
                    for (const [key, desc] of Object.entries(commands)) {
                        helpText += `  <span class="highlight">${key.padEnd(12)}</span> ${desc}\n`;
                    }
                    printOutput(helpText);
                    return;
                }

                if (command === 'about') {
                    printOutput(content.about);
                    return;
                }

                if (command === 'skills') {
                    printOutput(content.skills);
                    return;
                }

                if (command === 'contact') {
                    printOutput(content.contact);
                    setTimeout(revealEmail, 0);
                    return;
                }

                if (command === 'links') {
                    printOutput(content.links);
                    return;
                }

                if (command === 'whoami') {
                    printOutput('<span class="success">dev</span>');
                    return;
                }

                if (command === 'date') {
                    const now = new Date();
                    printOutput('<span class="info">' + now.toString() + '</span>');
                    return;
                }

                if (command === 'matrix') {
                    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
                    let matrixText = '';
                    for (let i = 0; i < 50; i++) {
                        matrixText += chars[Math.floor(Math.random() * chars.length)];
                    }
                    printOutput('<span class="success">' + matrixText + '</span>');
                    return;
                }

                if (command === 'ls' || command === 'dir') {
                    printOutput('<span class="dim">about  contact  links  skills  help</span>');
                    return;
                }

                if (command === 'cat' || command === 'read') {
                    printOutput('<span class="error">Usage: cat [file]</span>\n<span class="dim">Available files: about, contact, links, skills</span>');
                    return;
                }

                printOutput(`<span class="error">Command not found: ${cmd}</span>\n<span class="dim">Type 'help' for available commands.</span>`);
            }

            commandInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const cmd = commandInput.value;
                    printOutput(`<span class="prompt"><span class="prompt-user">dev</span><span class="prompt-at">@</span><span class="prompt-host">muhfajar</span><span class="prompt-path">:~</span><span class="prompt-symbol">$</span></span> <span class="command-echo">${cmd}</span>`);
                    executeCommand(cmd);
                    commandInput.value = '';
                    terminalBody.scrollTop = terminalBody.scrollHeight;
                }
            });

            terminalBody.addEventListener('click', function() {
                commandInput.focus();
            });

            printWelcome();
            commandInput.focus();

            function revealEmail() {
                const link = document.getElementById('contact-link');
                if (link) {
                    const user = 'contact';
                    const domain = 'muhfajar.email';
                    link.textContent = user + '@' + domain;
                    link.href = 'mailto:' + user + '@' + domain;
                }
            }
            revealEmail();
        </script>
    </body>
</html>
